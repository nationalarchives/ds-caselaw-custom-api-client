exclude: src/caselawclient/xquery
repos:
  - hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-xml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: forbid-submodules
      - id: mixed-line-ending
      - id: no-commit-to-branch
      - id: trailing-whitespace
    repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
  - hooks:
      - args:
          - --fix
          - --exit-non-zero-on-fix
        id: ruff-check
      - id: ruff-format
    repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
  - hooks:
      - entry: script/build_xquery_type_dicts
        id: build-xquery-type-dicts
        language: python
        name: build-xquery-type-dicts
    repo: local
  - hooks:
      - language: python
        additional_dependencies:
          - types-requests==2.33.0.20260408
          - boto3-stubs[s3,sns]==1.42.91
          - types-python-dateutil==2.9.0.20260408
          - types-pytz==2026.1.1.20260408
          - types-lxml==2026.2.16
          - ds-caselaw-utils==4.1.1
          - pydantic==2.13.2
        args:
          - --strict
        files: ^src/
        id: mypy
        name: mypy-src
    repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
  - hooks:
      - language: python
        additional_dependencies:
          - types-requests==2.33.0.20260408
          - boto3-stubs[s3,sns]==1.42.91
          - types-python-dateutil==2.9.0.20260408
          - types-pytz==2026.1.1.20260408
          - types-lxml==2026.2.16
          - ds-caselaw-utils==4.1.1
          - pydantic==2.13.2
        exclude: ^smoketest/
        id: mypy
        name: mypy-tests
    repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
  - hooks:
      - id: prettier
        types_or:
          - yaml
          - json
          - xml
          - markdown
          - scss
          - javascript
    repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
  - hooks:
      - id: commitizen
      - id: commitizen-branch
        stages:
          - pre-push
    repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.128.0
    hooks:
      - id: renovate-config-validator
        args: [--strict]
        files: ^renovate\.json$

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.24.1
    hooks:
      - id: zizmor
